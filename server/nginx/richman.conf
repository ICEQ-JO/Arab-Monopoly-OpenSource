# Nginx reverse-proxy config for Arab Monopoly.
#
# The Node server already serves the built client from client/dist/, so nginx
# only needs to proxy everything (HTTP + WebSocket) to localhost:4000.
#
# Usage:
#   1. Replace $SERVER_NAME below with your domain or public IP.
#   2. Copy this file to /etc/nginx/sites-available/richman
#   3. Enable it: sudo ln -s /etc/nginx/sites-available/richman /etc/nginx/sites-enabled/
#   4. Test and reload: sudo nginx -t && sudo systemctl reload nginx
#   5. Restart the game server with the matching origin:
#        CLIENT_ORIGIN=http://$SERVER_NAME npm start
#
# If you only want LAN play without a domain, set SERVER_NAME to your machine's
# IP (e.g. 192.168.100.37) and access http://$SERVER_NAME directly on port 80.

server {
    listen 80;
    server_name _;  # change to your domain/IP

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Socket.IO long-polling/WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;
    }
}
